version: "3.8"

# ═══════════════════════════════════════════════════════════════════
#  paperflow – Portainer Stack
#
#  Deployment via Portainer → Stacks → Add Stack → Repository:
#    Repository URL:   https://github.com/Caps3n/paperflow
#    Compose path:     docker-compose.portainer.yml
#    Auto-update:      optional aktivieren
#
#  Umgebungsvariablen im "Environment variables" Tab setzen:
#    PAPERLESS_URL      z.B. http://192.168.1.50:8777
#    PAPERLESS_TOKEN    API-Token aus Paperless Admin
#    AMAZON_EMAIL       deine Amazon-E-Mail
#    AMAZON_PASSWORD    dein Amazon-Passwort
#
#  Browser-Login (Amazon, IKEA mit 2FA):
#    http://<server-ip>:6080/vnc.html → einmalig einloggen
#    Session bleibt dauerhaft erhalten
# ═══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────
  # paperflow-chrome – echter Browser mit noVNC Web-UI + CDP
  #   noVNC:  http://<server-ip>:6080/vnc.html  (einmalig für Login)
  #   CDP:    intern auf port 9222 (paperflow verbindet sich)
  # ─────────────────────────────────────────────────────────────────
  paperflow-chrome:
    image: lscr.io/linuxserver/chromium:latest
    container_name: paperflow-chrome
    restart: unless-stopped
    ports:
      - "6080:3000"       # noVNC Web-UI
    volumes:
      - chrome_data:/config    # Chrome-Profil + Cookies persistent
    shm_size: "1gb"
    networks:
      - paperflow
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - CHROME_CLI=--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --no-sandbox

  # ─────────────────────────────────────────────────────────────────
  # paperflow – Invoice Fetcher + Web-UI
  #   Web-UI: http://<server-ip>:8085
  # ─────────────────────────────────────────────────────────────────
  paperflow:
    image: ghcr.io/caps3n/paperflow:latest
    container_name: paperflow
    restart: unless-stopped
    depends_on:
      - paperflow-chrome
    ports:
      - "8085:8080"       # Web-UI
    volumes:
      - paperflow_data:/app/data             # SQLite-DB + Logs + Einstellungen
      - paperflow_downloads:/app/downloads   # Temporäre PDFs
      - paperflow_config:/app/config         # Konfiguration
      - paperflow_providers:/app/providers_custom  # Eigene Provider
    shm_size: "512mb"
    networks:
      - paperflow
    environment:
      # Chrome CDP (internes Netzwerk – nicht ändern)
      - CHROME_CDP_URL=http://paperflow-chrome:9222

      # Paperless-NGX
      - PAPERLESS_URL=${PAPERLESS_URL:-http://192.168.178.37:8777}
      - PAPERLESS_TOKEN=${PAPERLESS_TOKEN}

      # Amazon
      - AMAZON_EMAIL=${AMAZON_EMAIL}
      - AMAZON_PASSWORD=${AMAZON_PASSWORD}
      - AMAZON_DOMAIN=${AMAZON_DOMAIN:-amazon.de}
      - AMAZON_START_YEAR=${AMAZON_START_YEAR:-2009}
      - AMAZON_INCREMENTAL=${AMAZON_INCREMENTAL:-false}

      # Scheduler & Upload
      - RUN_INTERVAL_HOURS=${RUN_INTERVAL_HOURS:-24}
      - RUN_ON_STARTUP=${RUN_ON_STARTUP:-true}
      - UPLOAD_WORKERS=${UPLOAD_WORKERS:-3}

# ─────────────────────────────────────────────────────────────────
volumes:
  chrome_data:
  paperflow_data:
  paperflow_downloads:
  paperflow_config:
  paperflow_providers:

networks:
  paperflow:
    driver: bridge
