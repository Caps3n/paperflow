# Provider-Konfiguration
# Setze 'enabled: true' um einen Provider zu aktivieren

providers:
  amazon:
    enabled: true
    # Paperless-Tag der automatisch gesetzt wird
    tags: ["Amazon", "Rechnung"]
    # Paperless-Correspondent
    correspondent: "Amazon"

  # PayPal deaktiviert – Login durch Passkey-Dialog blockiert
  # paypal:
  #   enabled: false
  #   tags: ["PayPal", "Kontoauszug"]
  #   correspondent: "PayPal"

  ikea:
    enabled: false
    tags: ["IKEA", "Kassenbon"]
    correspondent: "IKEA"

  # Weitere Provider können hier hinzugefügt werden:
  # ebay:
  #   enabled: false
  #   tags: ["eBay", "Rechnung"]
  #   correspondent: "eBay"
